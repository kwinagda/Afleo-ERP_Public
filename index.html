<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afleo Group — Trade Intelligence Console</title>
<meta http-equiv="refresh" content="0; url=./afleo_dgft_v2.html">
<style>
  :root{
    --bg:#f6f8ff;
    --panel:#ffffff;
    --border:#d9e2ff;
    --text:#111111;
    --muted:#5f6675;
    --accent:#3764eb;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    font-family:Manrope,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, rgba(55,100,235,.1), transparent 28%),
      radial-gradient(circle at bottom right, rgba(55,100,235,.06), transparent 24%),
      linear-gradient(180deg,#f7f9ff 0%,#eef3ff 100%);
  }
  .card{
    width:min(560px,100%);
    padding:28px;
    border:1px solid var(--border);
    border-radius:24px;
    background:var(--panel);
    box-shadow:0 18px 36px rgba(55,100,235,.08);
    text-align:center;
  }
  h1{
    margin:0 0 10px;
    font-size:28px;
    line-height:1.1;
  }
  p{
    margin:0 0 18px;
    font-size:15px;
    line-height:1.6;
    color:var(--muted);
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:0 18px;
    border-radius:999px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    font-weight:700;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Afleo Trade Intelligence Console</h1>
    <p>If you are not redirected automatically, use the button below to open the tool.</p>
    <a href="./afleo_dgft_v2.html">Open Tool</a>
  </main>
</body>
</html>
